<!doctype html>
<html lang="en" class="min-h-screen">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300..900&family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />
		<script>
			const stored = localStorage.getItem('darkMode');
			const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			if (stored === 'true' || (stored === null && prefersDark)) {
				document.documentElement.classList.add('dark');
			}
		</script>
		<style>body{background:#eff1f5}html.dark body{background:#1e1e2e}</style>
		%sveltekit.head%
	</head>
	<body class="latte bg-base min-h-screen" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
